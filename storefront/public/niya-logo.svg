<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 340" fill="none">
  <!-- Oval symbol -->
  <ellipse cx="130" cy="92" rx="56" ry="76" stroke="#C9A96E" stroke-width="1.3" fill="none"/>

  <!-- Center vertical line -->
  <line x1="130" y1="16" x2="130" y2="152" stroke="#C9A96E" stroke-width="1.2"/>

  <!-- Upper fan diagonals from top point to equator -->
  <line x1="130" y1="16" x2="74" y2="92" stroke="#C9A96E" stroke-width="1.2"/>
  <line x1="130" y1="16" x2="186" y2="92" stroke="#C9A96E" stroke-width="1.2"/>

  <!-- Lower fan diagonals from equator center downward -->
  <line x1="130" y1="92" x2="80" y2="134" stroke="#C9A96E" stroke-width="1.2"/>
  <line x1="130" y1="92" x2="180" y2="134" stroke="#C9A96E" stroke-width="1.2"/>

  <!-- Wave lines in lower third of oval -->
  <path d="M96,138 Q113,130 130,138 Q147,146 164,138" stroke="#C9A96E" stroke-width="1.2" fill="none"/>
  <path d="M96,152 Q113,144 130,152 Q147,160 164,152" stroke="#C9A96E" stroke-width="1.2" fill="none"/>

  <!-- Separator line -->
  <line x1="114" y1="182" x2="146" y2="182" stroke="#C9A96E" stroke-width="1.2"/>

  <!-- NIYA -->
  <text x="130" y="232"
    font-family="'Cormorant Garamond', 'Cormorant', Georgia, serif"
    font-size="52"
    font-weight="300"
    letter-spacing="6"
    fill="#C9A96E"
    text-anchor="middle">NĪY A</text>

  <!-- JEWELS -->
  <text x="130" y="260"
    font-family="'Jost', 'Arial', sans-serif"
    font-size="9.5"
    font-weight="300"
    letter-spacing="10"
    fill="#C9A96E"
    text-anchor="middle">JEWELS</text>
</svg>
